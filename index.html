<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HYROX Gym Finder</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23171915'/%3E%3Cpath d='M7 16h18M16 7v18' stroke='%23e0ff34' stroke-width='4'/%3E%3C/svg%3E" />
    <meta
      name="description"
      content="Find the nearest HYROX certified gyms from your GPS location, exact address, city tags, or local HYROXCN JSON export."
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="locator-bar" aria-labelledby="app-title">
        <div class="title-row">
          <div>
            <p class="eyebrow">HYROX Scenario Tool</p>
            <h1 id="app-title">Find your nearest HYROX gym</h1>
          </div>
          <a class="source-link" href="https://hyrox-training-finder.hyrox.com/" target="_blank" rel="noreferrer">HYROX Finder</a>
        </div>

        <form id="search-form" class="search-form">
          <label>
            <span>Exact address, city, district, or gym name</span>
            <input
              id="query"
              name="query"
              type="search"
              placeholder="5 Doyers St, New York, NY 10013, United States"
              autocomplete="off"
            />
          </label>

          <div class="actions">
            <button id="use-location" type="button">Use my GPS</button>
            <button type="submit" class="secondary">Search nearby</button>
          </div>
        </form>

        <p id="status" class="status" role="status">
          Ready. The default search asks for GPS, reverse-geocodes your precise place, and ranks nearby HYROX gyms first.
        </p>
      </section>

      <section class="finder-layout" aria-label="Nearest HYROX gyms">
        <section class="map-panel" aria-labelledby="map-title">
          <div class="panel-heading">
            <h2 id="map-title">Nearby map</h2>
          </div>
          <div id="map" class="map-canvas" aria-live="polite"></div>
        </section>

        <section class="results-panel" aria-labelledby="results-title">
          <div class="panel-heading">
            <h2 id="results-title">Nearest gyms</h2>
            <span id="result-count" class="pill">0 results</span>
          </div>
          <div id="results" class="results-list"></div>
        </section>
      </section>
    </main>

    <template id="empty-template">
      <div class="empty-state">
        <h3>No gyms matched this search</h3>
        <p>Allow GPS or enter a precise address to rank HYROX gyms by distance.</p>
      </div>
    </template>

    <script type="module" src="./src/main.mjs?v=20260630-map-results"></script>
  </body>
</html>
